<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ClaudeAI Academy — Couverture Reel (1080×1920)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F5F1EB; --cream-soft:#FAF7F2;
    --coral:#D97757; --coral-dark:#C2664A; --coral-soft:#F2D5C7;
    --ink:#1F1F1E; --ink-soft:#3D3929; --muted:#6B6557; --line:#E5DED0; --green:#2A9D8F;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --serif:'Fraunces',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);-webkit-font-smoothing:antialiased;background:var(--cream)}

  /* Couverture reel 1080×1920. Le feed/la grille recadrent en 4:5 CENTRÉ
     (bande sûre verticale ≈ 285 → 1635). Tout l'essentiel est dans cette bande :
     padding haut/bas 360px → contenu entre y=360 et y=1560. */
  .cover{
    position:relative; width:1080px; height:1920px; overflow:hidden;
    background:var(--cream); color:var(--ink);
    display:flex; flex-direction:column; padding:360px 104px;
  }
  .cover::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(120% 75% at 78% 14%, rgba(217,119,87,.20), transparent 55%),
               radial-gradient(95% 60% at 8% 92%, rgba(217,119,87,.12), transparent 52%);
    pointer-events:none;
  }
  /* repère discret du cadrage grille 4:5 — invisible à l'export (commenté) */
  .cover > *{position:relative; z-index:1}

  .top{flex:0 0 auto; display:flex; align-items:center; gap:22px}
  .kicker{font-size:28px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--coral)}
  .dot{width:15px;height:15px;border-radius:50%;background:var(--green)}
  .live{font-size:28px; font-weight:600; letter-spacing:.10em; color:var(--ink-soft); text-transform:uppercase}

  .mid{flex:1 1 auto; display:flex; flex-direction:column; justify-content:center}
  .play{
    width:128px; height:128px; border-radius:50%; background:var(--coral);
    display:flex; align-items:center; justify-content:center; margin:0 0 56px;
    box-shadow:0 20px 46px rgba(217,119,87,.40);
  }
  .play::after{content:""; border-style:solid; border-width:30px 0 30px 50px;
    border-color:transparent transparent transparent #fff; margin-left:10px}

  h1{font-family:var(--serif); font-weight:500; line-height:1.04; letter-spacing:-.02em;
     font-size:118px; color:var(--ink); text-wrap:balance}
  h1 em{font-style:italic; color:var(--coral)}
  .lead{font-size:44px; line-height:1.45; color:var(--ink-soft); margin-top:44px; text-wrap:pretty}

  .bot{flex:0 0 auto; display:flex; align-items:center; gap:20px}
  .tag{font-size:32px; font-weight:600; color:var(--ink)}
  .sep{width:8px;height:8px;border-radius:50%;background:var(--coral)}
  .bot .light{color:var(--muted); font-weight:400}
</style>
</head>
<body>
  <section class="cover">
    <div class="top">
      <span class="kicker">ClaudeAI Academy</span>
      <span class="dot"></span>
      <span class="live">En ligne</span>
    </div>

    <div class="mid">
      <div class="play"></div>
      <h1>Et si <em>Claude</em> t'apprenait à utiliser <em>Claude&nbsp;?</em></h1>
      <p class="lead">La formation francophone à l'IA, construite avec Claude.</p>
    </div>

    <div class="bot">
      <span class="tag">Programme complet</span>
      <span class="sep"></span>
      <span class="tag light">lien en bio</span>
    </div>
  </section>
</body>
</html>
