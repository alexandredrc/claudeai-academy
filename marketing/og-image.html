<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>ClaudeAI Academy — OG image 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F5F1EB; --cream-soft:#FAF7F2; --cream-dark:#EDE6D9;
    --coral:#D97757; --coral-dark:#C2664A; --coral-soft:#F2D5C7;
    --ink:#1F1F1E; --ink-soft:#3D3929; --muted:#6B6557; --line:#E5DED0;
    --sans:'Inter',sans-serif; --serif:'Fraunces',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:var(--sans); background:var(--cream); color:var(--ink);
    -webkit-font-smoothing:antialiased; position:relative;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:64px 72px 56px;
  }
  body::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(95% 85% at 88% 0%, rgba(217,119,87,.18), transparent 55%);
    pointer-events:none;
  }
  body > *{position:relative; z-index:1}

  .brand{ display:flex; align-items:center; gap:14px }
  .brand .mark{ width:44px; height:44px }
  .brand .name{ font-size:26px; letter-spacing:-.01em }
  .brand .name b{ font-weight:700 }

  h1{
    font-family:var(--serif); font-weight:500; line-height:1.06;
    letter-spacing:-.02em; font-size:74px; color:var(--ink);
    max-width:980px;
  }
  h1 em{ font-style:italic; color:var(--coral) }
  .sub{ margin-top:18px; font-size:27px; color:var(--ink-soft); max-width:900px; line-height:1.45 }

  .footer{ display:flex; justify-content:space-between; align-items:flex-end }
  .chips{ display:flex; gap:12px }
  .chip{
    background:var(--cream-soft); border:1px solid var(--line);
    border-radius:999px; padding:12px 22px;
    font-size:21px; font-weight:600; color:var(--ink-soft);
  }
  .chip b{ font-family:var(--serif); font-weight:500; color:var(--coral); font-size:23px }
  .domain{ font-size:22px; font-weight:700; color:var(--coral) }
</style>
</head>
<body>
  <div class="brand">
    <svg class="mark" viewBox="0 0 32 32"><circle cx="16" cy="16" r="15" fill="#D97757"></circle><path d="M10 11c1.5-1 3-1.5 5-1.5s4 .5 5.5 2c-1 .5-2 1-3 1-1.5 0-2.5-.5-4-.5-1 0-1.8.3-2.5.8-.5-.5-.8-1.2-1-1.8zm12 9.5c-1.5 1-3 1.5-5 1.5s-4-.5-5.5-2c1-.5 2-1 3-1 1.5 0 2.5.5 4 .5 1 0 1.8-.3 2.5-.8.5.5.8 1.2 1 1.8z" fill="#1F1F1E"></path></svg>
    <span class="name"><b>ClaudeAI</b> Academy</span>
  </div>

  <div>
    <h1>La formation francophone pour <em>maîtriser Claude AI</em>.</h1>
    <div class="sub">Prompt engineering, Claude Code, data, marketing, stratégie. Mentor IA inclus.</div>
  </div>

  <div class="footer">
    <div class="chips">
      <span class="chip"><b>7</b>&nbsp;parcours</span>
      <span class="chip"><b>40</b>&nbsp;leçons</span>
      <span class="chip"><b>170</b>&nbsp;prompts</span>
    </div>
    <div class="domain">claudeai-academy.com</div>
  </div>
</body>
</html>
